# ==============================================================================
# Letta Server Configuration Template
# ==============================================================================
# This file documents the key Letta configuration options.
# In Docker deployments, prefer environment variables over this file.
#
# Reference: https://docs.letta.com/server/configuration
# ==============================================================================

# ------------------------------------------------------------------------------
# LLM Backend
# ------------------------------------------------------------------------------
# Default model for new agents. When using Ollama on the same Docker network,
# use the service name (p4n4-ollama) as the host.
#
# Examples:
#   ollama/llama3.2            (via p4n4-ollama on p4n4-net)
#   openai/gpt-4o              (requires OPENAI_API_KEY env var)
#   anthropic/claude-3-5-sonnet (requires ANTHROPIC_API_KEY env var)
#
# default_chat_model: ollama/llama3.2
# ollama_base_url: http://p4n4-ollama:11434

# ------------------------------------------------------------------------------
# Embedding Backend
# ------------------------------------------------------------------------------
# For local embeddings with Ollama:
#   default_embedding_model: ollama/nomic-embed-text
#   ollama_base_url: http://p4n4-ollama:11434
#
# For OpenAI embeddings:
#   default_embedding_model: openai/text-embedding-3-small

# ------------------------------------------------------------------------------
# Storage Backend
# ------------------------------------------------------------------------------
# Default: SQLite at /root/.letta/letta.db (persisted via Docker volume).
# For production, use PostgreSQL:
#   Set LETTA_PG_URI=postgresql://user:password@host:5432/letta
#   (or use docker-compose.override.yml)

# ------------------------------------------------------------------------------
# Environment Variables (preferred over this file in Docker)
# ------------------------------------------------------------------------------
# LETTA_SERVER_PASSWORD   — API password (set in .env)
# LETTA_PG_URI            — PostgreSQL connection string (optional)
# OPENAI_API_KEY          — OpenAI key (if using OpenAI backend)
# ANTHROPIC_API_KEY       — Anthropic key (if using Anthropic backend)
